events {
    worker_connections 1024;
}

http {
    # Enable WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name localhost;

        # Re-resolve upstream container names at request time via Docker's
        # embedded DNS, so a recreated frontend/backend (new IP) doesn't leave
        # nginx proxying to a dead address → 502. Pairs with the variable
        # proxy_pass targets below (a literal proxy_pass resolves only at startup).
        resolver 127.0.0.11 valid=10s ipv6=off;

        # Increase body size for file uploads
        client_max_body_size 100M;

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeouts so Next.js first-time dev compiles don't 502
        proxy_connect_timeout 60s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # All API traffic -> consolidated core-backend
        # core-backend/app/main.py mounts every module router under /api/v1/<module>/
        # (variable target → resolved at request time; original URI passes through)
        location /api/ {
            set $backend bmp-core-backend;
            proxy_pass http://$backend:8000;
        }

        # Uploaded files served from the same backend (StaticFiles mount at /uploads).
        location /uploads/ {
            set $backend bmp-core-backend;
            proxy_pass http://$backend:8000;
        }

        # All UI traffic -> core-frontend
        # Core-frontend now contains every module's pages natively at /<module>/...
        location / {
            set $frontend core-frontend;
            proxy_pass http://$frontend:3000;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
