events {
    worker_connections 1024;
}

http {
    # Enable WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name localhost;

        # Increase body size for file uploads
        client_max_body_size 100M;

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeouts so Next.js first-time dev compiles don't 502
        proxy_connect_timeout 60s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # All API traffic -> consolidated core-backend
        # core-backend/app/main.py mounts every module router under /api/v1/<module>/
        location /api/ {
            proxy_pass http://bmp-core-backend:8000/api/;
        }

        # Uploaded files served from the same backend (StaticFiles mount at /uploads).
        location /uploads/ {
            proxy_pass http://bmp-core-backend:8000/uploads/;
        }

        # All UI traffic -> core-frontend
        # Core-frontend now contains every module's pages natively at /<module>/...
        location / {
            proxy_pass http://core-frontend:3000;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
