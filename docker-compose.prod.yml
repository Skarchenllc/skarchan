# Production stack — run STANDALONE (not merged with docker-compose.yml):
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Differences from the dev docker-compose.yml:
#   • Frontend  → real `next build` + `next start` image (Dockerfile.prod), no source bind-mounts
#   • Backend   → runs the image's code (no bind-mount), uvicorn WITHOUT --reload, DEBUG=False
#   • Secrets   → DB password, SECRET_KEY, VAULT key, API keys come from .env (required ones fail fast if unset)
#   • Networking→ internal service ports are NOT published to the host; only nginx :80 is public
#   • restart: unless-stopped on everything
#   • Slimmed for AWS: Redis dropped (unused — rate limiter is in-memory) and
#     ChromaDB dropped (optional semantic search; backend falls back to keyword).
#     Stack = nginx + frontend + backend + postgres (4 containers).
#   • Fits a 2 GB instance: the frontend is a Next.js *standalone* image (~290 MB,
#     low RAM) and images are BUILT IN CI and loaded onto the box (it never runs
#     the memory-heavy build). Deploy with `up --no-build` so it only runs them.
#     For a one-off LOCAL run on a beefy machine: `docker compose -f docker-compose.prod.yml up --build`.
#
# Required .env keys (the deploy workflow writes these from GitHub secrets):
#   POSTGRES_PASSWORD, SECRET_KEY, VAULT_ENCRYPTION_KEY  (required)
#   ANTHROPIC_API_KEY                                    (optional)
#   POSTGRES_USER, POSTGRES_DB                           (optional; default postgres / business_management)

name: nexacore

services:
  nginx:
    image: nginx:alpine
    container_name: bmp-nginx
    ports:
      - "80:80"
      # - "443:443"   # uncomment after adding a TLS server block + certs to nginx/nginx.conf
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-frontend
      - core-backend
    networks: [bmp-network]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: bmp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-business_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/databases/init-scripts:/docker-entrypoint-initdb.d
    networks: [bmp-network]
    restart: unless-stopped

  # Redis and ChromaDB removed to stay lean: Redis was unused (the rate limiter
  # is in-memory), and ChromaDB powered optional semantic "Ask Your Data" search —
  # the backend falls back to keyword retrieval without it.

  core-frontend:
    # Built in CI and loaded onto the instance (the 2 GB box never builds).
    # `pull_policy: never` → use the locally-loaded image, don't try a registry.
    image: nexacore-frontend:latest
    pull_policy: never
    build:
      context: .
      dockerfile: modules/core/frontend/Dockerfile.prod
    container_name: bmp-core-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_MODULE=core
      # Standalone server is lean; cap the heap so it can't balloon on a 2 GB host.
      - NODE_OPTIONS=--max-old-space-size=512
    depends_on:
      - core-backend
    networks: [bmp-network]
    restart: unless-stopped

  core-backend:
    image: nexacore-backend:latest
    pull_policy: never
    build:
      context: ./modules/core/backend
      dockerfile: Dockerfile
    container_name: bmp-core-backend
    # Prod command: drop --reload (the dev Dockerfile's CMD). Single async worker
    # avoids double-running the in-process AI/automation schedulers.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-business_management}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REFRESH_TOKEN_EXPIRE_DAYS=30
      - DEBUG=False
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VAULT_ENCRYPTION_KEY=${VAULT_ENCRYPTION_KEY:?Set VAULT_ENCRYPTION_KEY in .env}
    depends_on:
      - postgres
    volumes:
      - uploads_data:/app/uploads
    networks: [bmp-network]
    restart: unless-stopped

networks:
  bmp-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
