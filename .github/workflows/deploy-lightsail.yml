name: Deploy to AWS Lightsail

# Deploys the Docker Compose stack to an AWS Lightsail *instance* (an Ubuntu VM
# running Docker + the Compose plugin). The stack is stateful (Postgres uses a
# Docker volume), so a VM is the right target — not the stateless Container Service.
#
# Images are BUILT ON THE RUNNER (the 2 GB instance can't run the Next.js build)
# and streamed to the box over SSH — no container registry required.
# Flow: checkout → write .env from secrets → build frontend+backend images →
# rsync runtime files → `docker save | ssh docker load` → `compose up --no-build`
# → health-check.
#
# ── Required repository secrets (Settings → Secrets and variables → Actions) ──
#   LIGHTSAIL_HOST         Public IP or DNS of the Lightsail instance
#   LIGHTSAIL_USER         SSH user (Ubuntu blueprint → "ubuntu")
#   LIGHTSAIL_SSH_KEY      Private key (full PEM contents) for that user
#   LIGHTSAIL_DEPLOY_DIR   Absolute path on the instance, e.g. /home/ubuntu/nexacore
#   POSTGRES_PASSWORD      Database password (set BEFORE the first deploy — it is
#                          baked into the postgres volume on init)
#   APP_SECRET_KEY         App secret → backend JWT signing key (>= 32 chars)
#   VAULT_ENCRYPTION_KEY   App secret → field-level encryption master key
#   ANTHROPIC_API_KEY      App secret → written into the instance .env
#
# Deploys the PRODUCTION stack (docker-compose.prod.yml): real Next.js build,
# DEBUG=False, secrets from .env, internal ports unpublished.
#
# One-time instance prep (run once on the VM):
#   sudo apt-get update && sudo apt-get install -y docker.io docker-compose-v2 rsync
#   sudo usermod -aG docker $USER   # then re-login
#   mkdir -p "$LIGHTSAIL_DEPLOY_DIR"
# Also open port 80 (and 443) in the Lightsail instance's networking firewall.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Never run two deploys to the same instance at once; let an in-flight deploy finish.
concurrency:
  group: lightsail-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy on Lightsail
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          if [ -z "${{ secrets.LIGHTSAIL_HOST }}" ]; then
            echo "::error::LIGHTSAIL_HOST secret is empty — set it to your instance's public/static IP."
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Best-effort known_hosts; the deploy steps use accept-new so this can't block.
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Write production .env
        run: |
          umask 077
          cat > .env <<EOF
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
          VAULT_ENCRYPTION_KEY=${{ secrets.VAULT_ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      # Build the images HERE on the runner (7 GB RAM) — the 2 GB Lightsail box
      # can't run the Next.js build. The frontend is a standalone image (~290 MB).
      - name: Build images on the runner
        run: |
          docker build -f modules/core/frontend/Dockerfile.prod -t nexacore-frontend:latest .
          docker build -t nexacore-backend:latest ./modules/core/backend

      - name: Sync runtime files to the instance
        env:
          TARGET: ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:${{ secrets.LIGHTSAIL_DEPLOY_DIR }}/
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude '__pycache__/' \
            --exclude 'venv/' \
            --exclude '.DS_Store' \
            --exclude 'systems_changes/' \
            --exclude 'modules/*/backend/uploads/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            ./ "$TARGET"

      # Stream the built images straight to the instance over the existing SSH
      # connection (no registry needed) and load them into its Docker.
      - name: Ship images to the instance
        run: |
          docker save nexacore-frontend:latest nexacore-backend:latest \
            | gzip \
            | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
                "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" \
                'gunzip | docker load'

      - name: Start containers (no build on the instance)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" \
            "cd '${{ secrets.LIGHTSAIL_DEPLOY_DIR }}' && \
             docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans && \
             docker image prune -f"

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" \
            "cd '${{ secrets.LIGHTSAIL_DEPLOY_DIR }}'; \
             for i in \$(seq 1 15); do \
               if curl -fsS http://localhost/ >/dev/null 2>&1; then echo 'Healthy ✓'; exit 0; fi; \
               echo \"waiting for app… (\$i/15)\"; sleep 6; \
             done; \
             echo '::error::Health check failed — recent logs:'; \
             docker compose -f docker-compose.prod.yml logs --tail=80; exit 1"
